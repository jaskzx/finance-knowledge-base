<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance Knowledge Base</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Finance Knowledge Base</h1>
    <!-- app.js fills this in after loading data/finance_kb.json -->
    <p id="status">Loading data…</p>
  </header>

  <!-- Cytoscape renders the graph into this element -->
  <div id="cy"></div>

  <!-- Cytoscape core + the fcose force layout and its dependencies.
       Load order matters: layout-base ← cose-base ← cytoscape-fcose, and fcose
       auto-registers against the global `cytoscape` present at load time. -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <script src="app.js"></script>
</body>
</html>
