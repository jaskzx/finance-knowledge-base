<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance Knowledge Base</title>
  <link rel="stylesheet" href="style.css" />
</head>
<!-- lang-en by default so the right toggle labels show before JS runs (avoids a
     flash of both languages). app.js overrides this if a choice is stored. -->
<body class="lang-en">
  <header>
    <div class="header-main">
      <h1 id="app-title">Finance Knowledge Base</h1>
      <!-- app.js fills this in: how many nodes/edges are currently visible -->
      <p id="status">Loading data…</p>
    </div>

    <!-- Search a term and center its node. app.js sets the placeholder per language. -->
    <input id="search" class="search" type="search" autocomplete="off"
           aria-label="Search terms" />

    <!-- Global language toggle. app.js wires the clicks and marks the active one. -->
    <div id="lang-toggle" role="group" aria-label="Language / 语言">
      <button class="lang-btn" type="button" data-lang="en">EN</button>
      <button class="lang-btn" type="button" data-lang="zh">中</button>
    </div>
  </header>

  <!-- One toggle per layer, all on by default. Toggles are additive: several
       layers can be shown at once. app.js builds them from its LAYERS list. -->
  <nav id="layer-toggles" aria-label="Show or hide layers"></nav>

  <!-- One toggle per bucket (A/B/C). A node shows only if its layer AND bucket
       are both on. app.js builds these. -->
  <nav id="bucket-toggles" aria-label="Show or hide buckets"></nav>

  <!-- Graph canvas plus an overlaid bucket-color legend. -->
  <div id="graph-wrap">
    <!-- Cytoscape renders the graph into this element -->
    <div id="cy"></div>
    <!-- app.js fills this so the swatches always match the node colors -->
    <div id="legend" aria-label="Bucket color legend"></div>
    <!-- Recenters/fits the visible nodes; app.js sets its label per language -->
    <button id="recenter-btn" type="button">Recenter</button>

    <!-- Hover tooltip (desktop) and click/tap detail panel; app.js fills both. -->
    <div id="tooltip" class="tooltip" hidden></div>
    <aside id="detail-panel" class="detail-panel" hidden aria-label="Term details"></aside>
  </div>

  <!-- Cytoscape core + the cose-bilkent layout and its deps. cose-bilkent is a
       force layout that can reserve each node's LABEL box (so labels never
       overlap) while keeping an organic cloud. Load order matters:
       layout-base <- cose-base <- cytoscape-cose-bilkent, and the extension
       auto-registers against the global `cytoscape` present at load time. -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.js"></script>
  <script src="app.js"></script>
</body>
</html>
