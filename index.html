<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance Knowledge Base</title>
  <link rel="stylesheet" href="style.css" />
</head>
<!-- lang-en by default so the right toggle labels show before JS runs (avoids a
     flash of both languages). app.js overrides this if a choice is stored. -->
<body class="lang-en">
  <header>
    <div class="header-main">
      <h1 id="app-title">Finance Knowledge Base</h1>
      <!-- app.js fills this in: how many nodes/edges are currently visible -->
      <p id="status">Loading data…</p>
    </div>

    <!-- Global language toggle. app.js wires the clicks and marks the active one. -->
    <div id="lang-toggle" role="group" aria-label="Language / 语言">
      <button class="lang-btn" type="button" data-lang="en">EN</button>
      <button class="lang-btn" type="button" data-lang="zh">中</button>
    </div>
  </header>

  <!-- One toggle per layer, all on by default. Toggles are additive: several
       layers can be shown at once. app.js builds them from its LAYERS list. -->
  <nav id="layer-toggles" aria-label="Show or hide layers"></nav>

  <!-- Graph canvas plus an overlaid bucket-color legend. -->
  <div id="graph-wrap">
    <!-- Cytoscape renders the graph into this element -->
    <div id="cy"></div>
    <!-- app.js fills this so the swatches always match the node colors -->
    <div id="legend" aria-label="Bucket color legend"></div>
  </div>

  <!-- Cytoscape core only. We use its built-in `cose` force layout, so no
       layout extensions are needed. -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
