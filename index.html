<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance Knowledge Base</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Finance Knowledge Base</h1>
    <!-- app.js fills this in: shows the active layer and its counts -->
    <p id="status">Loading data…</p>
  </header>

  <!-- One button per layer. Only the active layer's nodes are shown at a time;
       app.js builds the buttons from its LAYERS list. -->
  <nav id="layer-tabs" aria-label="Knowledge base layers"></nav>

  <!-- Graph canvas plus an overlaid bucket-color legend. -->
  <div id="graph-wrap">
    <!-- Cytoscape renders the graph into this element -->
    <div id="cy"></div>
    <!-- app.js fills this so the swatches always match the node colors -->
    <div id="legend" aria-label="Bucket color legend"></div>
  </div>

  <!-- Cytoscape core only. We use its built-in `cose` force layout, so no
       layout extensions are needed. -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
